<!DOCTYPE html>
<html>
<style>
    .skel {
        width: 100%;
        height: 20px;
        background: #eee;
         animation: pulse 1s infinite;
    }
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }
</style>
<body>
    <div class="skel"></div>
    <br>
    <div class="skel"   style="width: 80%;"></div>
</body>
</html>
