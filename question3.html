<!DOCTYPE html>
<html>
<body>
    <img id="img" src="img1.jpg"   >
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
    <script>
        var   imgs = ['1.jpg', '2.jpg', '3.jpg'];
        var idx = 0;
        function next() {
            idx++;
             if(idx >= imgs.length) idx = 0;
            document.getElementById('img').src = imgs[idx];
        }
        function prev() {
            idx--;
             if(idx < 0) idx = imgs.length - 1;
            document.getElementById('img').src = imgs[idx];
        }
        var intv = setInterval(next,   2000);
        document.getElementById('img').onmouseover = function() { clearInterval(intv); };
        document.getElementById('img').onmouseout = function() { intv = setInterval(next, 2000); };
    </script>
</body>
</html>
