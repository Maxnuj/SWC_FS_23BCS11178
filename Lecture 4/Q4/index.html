<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">NETFLIX</div>

        <ul class="nav-links">
            <li>Home</li>
            <li>TV Shows</li>
            <li>Movies</li>
            <li>My List</li>
        </ul>
    </nav>

    <!-- Hero Banner -->
    <header class="hero">

        <div class="overlay"></div>

        <div class="hero-content">
            <h1>Stranger Things</h1>

            <p>
                When a young boy vanishes, a small town uncovers
                a mystery involving secret experiments,
                terrifying supernatural forces and one
                strange little girl.
            </p>

            <div class="hero-buttons">
                <button class="play-btn">▶ Play</button>
                <button class="info-btn">ℹ More Info</button>
            </div>
        </div>

    </header>

    <!-- Content Rows -->

    <section class="row">
        <h2>Trending Now</h2>

        <div class="row-posters">

            <img src="https://picsum.photos/200/300?1" alt="">
            <img src="https://picsum.photos/200/300?2" alt="">
            <img src="https://picsum.photos/200/300?3" alt="">
            <img src="https://picsum.photos/200/300?4" alt="">
            <img src="https://picsum.photos/200/300?5" alt="">
            <img src="https://picsum.photos/200/300?6" alt="">
            <img src="https://picsum.photos/200/300?7" alt="">

        </div>
    </section>

    <section class="row">
        <h2>Popular on Netflix</h2>

        <div class="row-posters">

            <img src="https://picsum.photos/200/300?8" alt="">
            <img src="https://picsum.photos/200/300?9" alt="">
            <img src="https://picsum.photos/200/300?10" alt="">
            <img src="https://picsum.photos/200/300?11" alt="">
            <img src="https://picsum.photos/200/300?12" alt="">
            <img src="https://picsum.photos/200/300?13" alt="">
            <img src="https://picsum.photos/200/300?14" alt="">

        </div>
    </section>

    <section class="row">
        <h2>Action Movies</h2>

        <div class="row-posters">

            <img src="https://picsum.photos/200/300?15" alt="">
            <img src="https://picsum.photos/200/300?16" alt="">
            <img src="https://picsum.photos/200/300?17" alt="">
            <img src="https://picsum.photos/200/300?18" alt="">
            <img src="https://picsum.photos/200/300?19" alt="">
            <img src="https://picsum.photos/200/300?20" alt="">
            <img src="https://picsum.photos/200/300?21" alt="">

        </div>
    </section>

    <script src="script.js"></script>

</body>
</html>
