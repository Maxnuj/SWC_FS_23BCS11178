<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar flex align-center">
        <div class="logo">
            Amazon
        </div>

        <div class="search-bar flex">
            <input
                type="text"
                placeholder="Search Amazon"
            >
            <button>Search</button>
        </div>

        <div class="nav-links flex">
            <div>Account</div>
            <div>Orders</div>
            <div>Cart 🛒</div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to Amazon Clone</h1>
        <p>Shop millions of products</p>
    </section>

    <!-- Product Grid -->
    <section class="container">

        <h2>Today's Deals</h2>

        <div class="product-grid">

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Product 1</h3>
                <p>$99</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Product 2</h3>
                <p>$149</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Product 3</h3>
                <p>$199</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Product 4</h3>
                <p>$249</p>
            </div>

        </div>

    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Amazon Clone</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
