<!DOCTYPE html>
<html>
<body>
    <form onsubmit="return val()"   >
        <input type="text" id="em" placeholder="Email">
        <span id="err" style="color:red"></span>
        <button type="submit">Submit</button>
    </form>
    <script>
        function val() {
            var   e = document.getElementById('em').value;
            if(e.indexOf('@') == -1) {
                 document.getElementById('err').innerText = 'Bad email';
                 return false;
            }
            return true;
        }
    </script>
</body>
</html>
